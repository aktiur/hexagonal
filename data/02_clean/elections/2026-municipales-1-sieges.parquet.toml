nom = "Nombre de sièges gagnées par liste candidate au premier tour des élections municipales 2026"
description = """
Ce fichier indique, pour chacune des listes candidates au premier tour des municipales
2026 et ayant remporté au moins un élu le nombre d'élus municipaux et d'élus
communautaires attribués à la liste.
"""
mimetype = "application/vnd.apache.parquet"
section = "Résultats électoraux"

[colonnes.code_commune]
type = "str"
nullable = false

[colonnes.numero_panneau]
type = "entier"
nullable = false

[colonnes.nuance]
type = "str"
nullable = false

[colonnes.liste_court]
type = "str"
nullable = false

[colonnes.liste]
type = "str"
nullable = false

[colonnes.elus_cm]
type = "entier"
nullable = false

[colonnes.elus_cc]
type = "entier"
nullable = false

nom = "Liste des personnes élues lors des élections des conseils de secteurs de Paris, Lyon et Marseille en 2026"
description = """
Pour chaque personne élue à l'issue des municipales 2026 à
quelles listes elle appartenait au premier tour, et le cas échéant, au deuxième tour.
"""
mimetype = "application/vnd.apache.parquet"
section = "Résultats électoraux"

[colonnes.code_secteur]
type = "str"
description = "Le code du secteur (<code commune>SR<numéro de secteur>)"
nullable = false

[colonnes.nom]
type = "str"
nullable = false

[colonnes.prenom]
type = "str"
nullable = false

[colonnes.sexe]
type = "str"
nullable = false

[colonnes.numero_panneau_t1]
type = "entier"
nullable = false

[colonnes.liste_t1]
type = "str"
nullable = false

[colonnes.nuance_t1]
type = "str"
nullable = false

[colonnes.ordre_t1]
type = "entier"
nullable = false

[colonnes.numero_panneau_t2]
type = "entier"
nullable = false

[colonnes.liste_t2]
type = "str"
nullable = false

[colonnes.nuance_t2]
type = "str"
nullable = false

[colonnes.ordre_t2]
type = "entier"
nullable = false

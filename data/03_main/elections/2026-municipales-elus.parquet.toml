nom = "Liste des personnes élues lors des municipales 2026"
description = """
Pour chaque personne élue à l'issue des municipales 2026, ce fichier indique si la
personne a été élue conseiller·ère municipal·e, conseiller·ère communautaire, et à
quelles listes elle appartenait au premier tour, et le cas échéant, au deuxième tour.
"""
mimetype = "application/vnd.apache.parquet"
section = "Résultats électoraux"

[colonnes.code_commune]
type = "str"
nullable = false

[colonnes.nom]
type = "str"
nullable = false

[colonnes.prenom]
type = "str"
nullable = false

[colonnes.sexe]
type = "str"
nullable = false

[colonnes.elu_cm]
type = "bool"
nullable = false

[colonnes.elu_cc]
type = "entier"
nullable = false

[colonnes.numero_panneau_t1]
type = "entier"
nullable = false

[colonnes.liste_t1]
type = "str"
nullable = false

[colonnes.nuance_t1]
type = "str"
nullable = false

[colonnes.numero_panneau_t2]
type = "entier"
nullable = false

[colonnes.liste_t2]
type = "str"
nullable = false

[colonnes.nuance_t2]
type = "str"
nullable = false

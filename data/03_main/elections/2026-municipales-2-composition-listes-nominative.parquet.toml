nom = "Composition nominative des listes de second tour des municipales 2026 après fusion"
description = """
Pour chacun des candidats au deuxième tour des élections municipales 2026, ce fichier
indique dans quelle liste et à quel ordre il figure au deuxième tour, et dans quelle
liste et à quel ordre il figurait au premier tour.
"""
mimetype = "application/vnd.apache.parquet"
section = "Résultats électoraux"

[colonnes.code_commune]
type = "str"
nullable = false

[colonnes.numero_panneau]
type = "entier"
nullable = false

[colonnes.ordre]
type = "entier"
nullable = false

[colonnes.numero_panneau_t1]
type = "entier"
nullable = false

[colonnes.ordre_t1]
type = "entier"
nullable = false

nom = "Composition des listes de second tour des élections des conseils de secteurs de Paris, Lyon et Marseille en 2026 après fusion"
description = """
Ce fichier indique la composition des listes de second tour pour les élections de conseils de secteur PLM en 2026 :
pour chacune d'entre elles, il est indiqué le nombre de candidats issus des différentes
listes de premier tour.
"""
mimetype = "application/vnd.apache.parquet"
section = "Résultats électoraux"

[colonnes.code_secteur]
type = "str"
description = "Le code du secteur (<code commune>SR<numéro de secteur>)"
nullable = false

[colonnes.numero_panneau]
type = "entier"
nullable = false

[colonnes.liste]
type = "str"
nullable = false

[colonnes.nuance]
type = "str"
nullable = false

[colonnes.numero_panneau_t1]
type = "entier"
nullable = false

[colonnes.liste_t1]
type = "str"
nullable = false

[colonnes.nuance_t1]
type = "str"
nullable = false

[colonnes.nombre]
type = "entier"
nullable = false
